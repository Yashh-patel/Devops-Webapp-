version: '3.9'

# Use this for local development with hot-reload
# Run: docker-compose -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./backend
    container_name: taskmanager-backend-dev
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - ./backend/src:/app/src   # Hot reload
    command: npm run dev
    networks:
      - taskmanager-net

  frontend:
    image: node:18-alpine
    container_name: taskmanager-frontend-dev
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000/api
      - CHOKIDAR_USEPOLLING=true    # Hot reload in Docker
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && npm start"
    depends_on:
      - backend
    networks:
      - taskmanager-net

networks:
  taskmanager-net:
    driver: bridge
